<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Report COD cash — A &amp; S Traders</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../assets/css/customer.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container py-5" style="max-width: 420px">
      <div class="text-center mb-4">
        <div class="brand-mark d-inline-flex mb-2">A&amp;S</div>
        <h1 class="h4 font-display fw-bold mb-1">Delivery — COD collected</h1>
        <p class="text-muted small mb-0">
          After customer pays cash, submit this form. The shop admin will confirm and mark the order
          <strong>Paid</strong>.
        </p>
      </div>

      <div class="border rounded-4 p-4 bg-white shadow-sm">
        <div id="codSuccess" class="alert alert-success small d-none"></div>
        <div id="codError" class="alert alert-danger small d-none"></div>

        <form id="codReportForm" novalidate>
          <div class="mb-3">
            <label class="form-label small fw-semibold" for="codOrderId">Order ID</label>
            <input
              type="text"
              class="form-control form-control-lg"
              id="codOrderId"
              placeholder="e.g. CR-2026-63512"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold" for="codPhone4">Customer mobile — last 4 digits</label>
            <input
              type="text"
              class="form-control form-control-lg"
              id="codPhone4"
              inputmode="numeric"
              maxlength="4"
              pattern="[0-9]{4}"
              placeholder="e.g. 6313"
              required
            />
            <div class="form-text small">Matches the number on the delivery bill.</div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold" for="codNote">Note (optional)</label>
            <input
              type="text"
              class="form-control"
              id="codNote"
              maxlength="200"
              placeholder="Collected full amount"
            />
          </div>
          <button type="submit" class="btn btn-accent btn-lg w-100" id="codSubmitBtn">
            Cash collected — notify shop
          </button>
        </form>
      </div>

      <p class="text-center text-muted small mt-4 mb-0">
        <a href="index.html" class="text-decoration-none">← Back to shop</a>
      </p>
    </div>

    <script src="../assets/js/customer-common.js?v=21"></script>
    <script src="../assets/js/collect-cod-page.js?v=1"></script>
  </body>
</html>
