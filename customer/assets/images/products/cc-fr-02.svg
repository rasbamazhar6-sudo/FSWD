<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#f8fafc"/>
  <rect x="40" y="40" width="520" height="520" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <!-- wall cavity -->
  <rect x="120" y="100" width="360" height="300" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <!-- steel frame -->
  <rect x="150" y="130" width="300" height="240" rx="8" fill="none" stroke="#475569" stroke-width="8"/>
  <line x1="150" y1="190" x2="450" y2="190" stroke="#475569" stroke-width="4"/>
  <line x1="150" y1="250" x2="450" y2="250" stroke="#475569" stroke-width="4"/>
  <line x1="150" y1="310" x2="450" y2="310" stroke="#475569" stroke-width="4"/>
  <line x1="220" y1="130" x2="220" y2="370" stroke="#475569" stroke-width="4"/>
  <line x1="380" y1="130" x2="380" y2="370" stroke="#475569" stroke-width="4"/>
  <!-- cistern tank inside -->
  <rect x="190" y="160" width="220" height="180" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
  <!-- dual flush -->
  <rect x="250" y="200" width="36" height="28" rx="6" fill="#cbd5e1"/>
  <rect x="314" y="200" width="36" height="28" rx="6" fill="#94a3b8"/>
  <text x="268" y="218" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11" font-weight="700">3L</text>
  <text x="332" y="218" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="11" font-weight="700">6L</text>
  <text x="300" y="470" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Concealed cistern frame</text>
  <text x="300" y="498" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">CC-FR-02 · 3/6L · Faisal</text>
</svg>
