<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#f8fafc"/>
  <rect x="40" y="40" width="520" height="520" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <!-- basin -->
  <ellipse cx="300" cy="360" rx="160" ry="70" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
  <ellipse cx="300" cy="350" rx="130" ry="48" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <!-- single-lever mixer -->
  <rect x="276" y="170" width="48" height="120" rx="8" fill="url(#tap)" stroke="#64748b" stroke-width="1"/>
  <rect x="288" y="185" width="24" height="70" rx="6" fill="#cbd5e1"/>
  <!-- spout -->
  <path d="M300 290 C300 310 340 320 360 330 L380 330" fill="none" stroke="url(#tap)" stroke-width="14" stroke-linecap="round"/>
  <!-- lever handle -->
  <rect x="250" y="200" width="100" height="16" rx="8" fill="#64748b"/>
  <circle cx="300" cy="208" r="10" fill="#334155"/>
  <defs>
    <linearGradient id="tap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="45%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <text x="300" y="470" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Basin mixer · single lever</text>
  <text x="300" y="498" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">MX-BS-05 · Porta</text>
</svg>
